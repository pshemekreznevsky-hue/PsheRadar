function t(lang, key) { return (STRINGS[lang] && STRINGS[lang][key]) || STRINGS.pl[key] || key; }

// ---------- Overpass: detect nearby shop ----------
async function findNearbyShop(lat, lon) {
  const query = `[out:json][timeout:15];(node(around:30,${lat},${lon})[shop];way(around:30,${lat},${lon})[shop];node(around:30,${lat},${lon})["shop"="mall"];way(around:30,${lat},${lon})["shop"="mall"];);out center 10;`;
  try {
    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: query,
    });
    const data = await res.json();
    const elements = data.elements || [];
    if (elements.length === 0) return null;
    const named = elements.find((e) => e.tags && e.tags.name) || elements[0];
    if (!named.tags) return null;
    return {
      name: named.tags.name || named.tags.brand || named.tags.shop,
      shopType: named.tags.shop || "sklep",
      brand: named.tags.brand || null,
    };
  } catch (e) {
    return null;
  }
}

async function callClaude(contentBlocks) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1500,
      messages: [{ role: "user", content: contentBlocks }],
      tools: [{ type: "web_search_20250305", name: "web_search" }],
    }),
  });
  const data = await response.json();
  const text = (data.content || []).map((b) => (b.type === "text" ? b.text : "")).filter(Boolean).join("\n");
  const clean = text.replace(/```json|```/g, "").trim();
  const jsonMatch = clean.match(/\{[\s\S]*\}/);
  return JSON.parse(jsonMatch ? jsonMatch[0] : clean);
}

function FieldScout() {
  const [lang, setLang] = useState("pl");
  const [step, setStep] = useState("start"); // start|loading|result|error|promo-checking|promo-manual|promo-loading|promo-result
  const [photo, setPhoto] = useState(null);
  const [coords, setCoords] = useState(null);
  const [placeName, setPlaceName] = useState(null);
  const [locStatus, setLocStatus] = useState("idle");
  const [errorMsg, setErrorMsg] = useState("");
  const [result, setResult] = useState(null);
  const [entryNo, setEntryNo] = useState(1);
  const [listening, setListening] = useState(false);
  const [voiceHint, setVoiceHint] = useState("");
  const [speaking, setSpeaking] = useState(false);
  const [autoSpeak, setAutoSpeak] = useState(true);
  const [detectedShop, setDetectedShop] = useState(null);
  const [manualShop, setManualShop] = useState("");
  const [promoResult, setPromoResult] = useState(null);

  const fileInputRef = useRef(null);
  const recognitionRef = useRef(null);

  const T = (key) => t(lang, key);

  const speak = useCallback((text) => {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    const speechLangMap = { pl: "pl-PL", en: "en-US", de: "de-DE", uk: "uk-UA" };
    utter.lang = speechLangMap[lang] || "pl-PL";
    const voices = window.speechSynthesis.getVoices();
    const match = voices.find((v) => v.lang && v.lang.startsWith(lang));
    if (match) utter.voice = match;
    utter.onstart = () => setSpeaking(true);
    utter.onend = () => setSpeaking(false);
    utter.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(utter);
  }, [lang]);

  const stopSpeaking = () => { window.speechSynthesis && window.speechSynthesis.cancel(); setSpeaking(false); };

  const fetchLocation = useCallback(() => {
    return new Promise((resolve) => {
      setLocStatus("fetching");
      if (!navigator.geolocation) { setLocStatus("denied"); resolve(null); return; }
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const { latitude, longitude } = pos.coords;
          const newCoords = { lat: latitude, lon: longitude };
          setCoords(newCoords);
          let name = null;
          try {
            const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=16&addressdetails=1`, { headers: { Accept: "application/json" } });
            const data = await r.json();
            name = data.display_name || null;
            setPlaceName(name);
          } catch (e) { setPlaceName(null); }
          setLocStatus("ok");
          resolve({ coords: newCoords, placeName: name });
        },
        () => { setLocStatus("denied"); resolve(null); },
        { enableHighAccuracy: true, timeout: 8000 }
      );
    });
  }, []);

  const handlePhoto = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      const base64 = dataUrl.split(",")[1];
      setPhoto({ dataUrl, mediaType: file.type || "image/jpeg", base64 });
    };
    reader.readAsDataURL(file);
  };

  const reset = () => { setStep("start"); setPhoto(null); setResult(null); setErrorMsg(""); setPromoResult(null); setDetectedShop(null); setManualShop(""); stopSpeaking(); };

  const runScan = useCallback(async (overrides = {}) => {
    const { photoOverride, coordsOverride, placeOverride } = overrides;
    const usedPhoto = photoOverride !== undefined ? photoOverride : photo;
    const usedCoords = coordsOverride !== undefined ? coordsOverride : coords;
    const usedPlace = placeOverride !== undefined ? placeOverride : placeName;

    if (!usedPhoto && !usedCoords) { setErrorMsg(T("needPhotoOrLoc")); return; }

    setStep("loading");
    setErrorMsg("");

    const locationLine = usedCoords
      ? `GPS: ${usedCoords.lat.toFixed(5)}, ${usedCoords.lon.toFixed(5)}.${usedPlace ? ` Likely address: ${usedPlace}.` : ""}`
      : "No GPS data — rely on the photo only.";

    const promptText = `You are a field-guide explorer assistant. Based on the data below, identify the place and give ONE specific, lesser-known, fact-checked highlight about it.

${locationLine}

RULES (important, to avoid making things up):
1. ALWAYS use the web_search tool to verify the fact before answering.
2. If you cannot confirm it with a credible source, set "verified": false and give a more general, safe description instead.
3. In "sources" list up to 2 URLs you actually used.
4. Respond in this language: ${LANG_NAMES[lang]}.

Respond ONLY in JSON, no markdown:
{"place": "short place name", "fact": "2-4 sentence highlight", "tags": ["tag1","tag2","tag3"], "verified": true, "sources": ["https://..."]}`;

    const contentBlocks = [];
    if (usedPhoto) contentBlocks.push({ type: "image", source: { type: "base64", media_type: usedPhoto.mediaType, data: usedPhoto.base64 } });
    contentBlocks.push({ type: "text", text: promptText });

    try {
      const parsed = await callClaude(contentBlocks);
      setResult(parsed);
      setEntryNo((n) => n + 1);
      setStep("result");
      if (autoSpeak) setTimeout(() => speak(`${parsed.place}. ${parsed.fact}`), 300);
    } catch (e) {
      setErrorMsg(T("genericError"));
      setStep("error");
    }
  }, [photo, coords, placeName, autoSpeak, speak, lang]);

  // ---------- Promo flow ----------
  const startPromoCheck = async () => {
    setStep("promo-checking");
    let usedCoords = coords;
    if (!usedCoords) {
      const loc = await fetchLocation();
      usedCoords = loc && loc.coords;
    }
    if (!usedCoords) { setStep("promo-manual"); return; }
    const shop = await findNearbyShop(usedCoords.lat, usedCoords.lon);
    if (shop) {
      setDetectedShop(shop);
      runPromoScan(shop.name);
    } else {
      setStep("promo-manual");
    }
  };

  const runPromoScan = async (shopName) => {
    setStep("promo-loading");
    const promptText = `You are a shopping assistant. The user is at or near this shop: "${shopName}".

Search the web for that shop's CURRENT, real, publicly published promotions (weekly flyer, official site, or reliable price-comparison site), and compare up to 5 promoted items against typical competitor prices.

RULES (important, to avoid making things up):
1. ALWAYS use web_search. Only include items you can back with a real, current, credible source.
2. If you find no verifiable current promotions, return an empty "items" array and set "verified": false.
3. Never invent prices. If a competitor price isn't verifiable, omit that field for that item rather than guessing.
4. Cap at 5 items, prioritizing the best real value.
5. Respond in this language: ${LANG_NAMES[lang]}.

Respond ONLY in JSON, no markdown:
{"shop": "shop name", "verified": true, "items": [{"name":"...", "promoPrice":"...", "competitorPrice":"... or omit", "note":"...", "source":"https://..."}], "checkedAt": "short note about recency"}`;

    try {
      const parsed = await callClaude([{ type: "text", text: promptText }]);
      setPromoResult(parsed);
      setStep("promo-result");
    } catch (e) {
      setErrorMsg(T("genericError"));
      setStep("error");
    }
  };

  const normalize = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

  const toggleListening = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setVoiceHint("—"); return; }
    if (listening) { recognitionRef.current && recognitionRef.current.stop(); setListening(false); return; }
    const recognition = new SR();
    const speechLangMap = { pl: "pl-PL", en: "en-US", de: "de-DE", uk: "uk-UA" };
    recognition.lang = speechLangMap[lang] || "pl-PL";
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onstart = () => { setListening(true); setVoiceHint(T("sayCmd")); };
    recognition.onerror = () => setListening(false);
    recognition.onend = () => setListening(false);
    recognition.onresult = async (event) => {
      const transcript = event.results[0][0].transcript;
      const norm = normalize(transcript);
      const triggers = { pl: "gdzie jestem", en: "where am i", de: "wo bin ich", uk: "де я" };
      setVoiceHint(transcript);
      if (norm.includes(triggers[lang] || "gdzie jestem")) {
        const loc = await fetchLocation();
        if (loc) runScan({ coordsOverride: loc.coords, placeOverride: loc.placeName, photoOverride: null });
      }
    };
    recognitionRef.current = recognition;
    recognition.start();
  };

  return (
    <div style={{ minHeight: "100vh", background: "radial-gradient(ellipse at top, #1f342c 0%, #0f1c17 70%)", color: "#ede4d3", fontFamily: "'Fraunces', serif", display: "flex", justifyContent: "center", padding: "24px 16px" }}>
      <div style={{ width: "100%", maxWidth: 420 }}>
        <Header entryNo={entryNo} lang={lang} setLang={setLang} T={T} />
        <VoiceBar listening={listening} voiceHint={voiceHint} onToggle={toggleListening} autoSpeak={autoSpeak} onToggleAutoSpeak={() => setAutoSpeak((v) => !v)} T={T} />

        {step === "start" && (
          <StartScreen photo={photo} coords={coords} placeName={placeName} locStatus={locStatus} errorMsg={errorMsg}
            fileInputRef={fileInputRef} onPhoto={handlePhoto} onRequestLocation={fetchLocation}
            onClearPhoto={() => setPhoto(null)} onScan={() => runScan()} onPromo={startPromoCheck} T={T} />
        )}
        {step === "loading" && <LoadingScreen text={T("loading")} />}
        {step === "result" && result && (
          <ResultCard result={result} entryNo={entryNo - 1} onReset={reset} speaking={speaking}
            onSpeak={() => speak(`${result.place}. ${result.fact}`)} onStopSpeak={stopSpeaking} T={T} />
        )}
        {step === "error" && <ErrorCard message={errorMsg} onRetry={reset} T={T} />}

        {step === "promo-checking" && <LoadingScreen text={T("promoChecking")} />}
        {step === "promo-manual" && (
          <PromoManual value={manualShop} onChange={setManualShop} onSubmit={() => manualShop.trim() && runPromoScan(manualShop.trim())} onBack={reset} T={T} />
        )}
        {step === "promo-loading" && <LoadingScreen text={T("promoSearching")} />}
        {step === "promo-result" && promoResult && (
          <PromoResult data={promoResult} shopHint={detectedShop} onBack={reset} T={T} />
        )}
      </div>
    </div>
  );
}

function Header({ entryNo, lang, setLang, T }) {
  return (
    <div style={{ marginBottom: 16, borderBottom: "1px solid #b58a4a55", paddingBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 18 }}>🧭</span>
          <span style={{ fontSize: 20, fontWeight: 700, letterSpacing: 0.3 }}>Odkrywca</span>
        </div>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#b58a4a", letterSpacing: 1 }}>
          №{String(entryNo).padStart(3, "0")}
        </span>
      </div>
      <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>
        <span style={{ fontSize: 11, color: "#8fae9d" }}>{T("langLabel")}:</span>
        <select value={lang} onChange={(e) => setLang(e.target.value)} style={{ background: "#0f1c17", color: "#ede4d3", border: "1px solid #b58a4a55", borderRadius: 4, fontSize: 12, padding: "3px 6px" }}>
          <option value="pl">Polski</option>
          <option value="en">English</option>
          <option value="de">Deutsch</option>
          <option value="uk">Українська</option>
        </select>
      </div>
    </div>
  );
}

function VoiceBar({ listening, voiceHint, onToggle, autoSpeak, onToggleAutoSpeak, T }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18, padding: "10px 12px", borderRadius: 6, background: "#b58a4a14", border: "1px solid #b58a4a33" }}>
      <button onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 6, background: listening ? "#b58a4a" : "transparent", color: listening ? "#16241f" : "#ede4d3", border: "1px solid #b58a4a99", borderRadius: 4, padding: "7px 10px", fontSize: 12, fontFamily: "'Fraunces', serif", fontWeight: 600, cursor: "pointer", flexShrink: 0 }}>
        <span>{listening ? "🎙️" : "🎤"}</span>{listening ? T("listen") : T("sayCmd")}
      </button>
      <span style={{ fontSize: 11, color: "#c9bfa8", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{voiceHint || T("voiceHintDefault")}</span>
      <button onClick={onToggleAutoSpeak} style={{ background: "transparent", border: "none", color: autoSpeak ? "#b58a4a" : "#6b6552", cursor: "pointer", flexShrink: 0, fontSize: 16 }}>{autoSpeak ? "🔊" : "🔇"}</button>
    </div>
  );
}

function Viewfinder({ photoUrl }) {
  return (
    <div style={{ position: "relative", width: 220, height: 220, margin: "0 auto 20px" }}>
      <div style={{ position: "absolute", inset: 0, borderRadius: "50%", overflow: "hidden", background: "#0b1512", border: "1px solid #b58a4a44" }}>
        {photoUrl ? <img src={photoUrl} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 40, opacity: 0.5 }}>📷</div>}
      </div>
    </div>
  );
}

function StartScreen({ photo, coords, placeName, locStatus, errorMsg, fileInputRef, onPhoto, onRequestLocation, onClearPhoto, onScan, onPromo, T }) {
  return (
    <div>
      <Viewfinder photoUrl={photo && photo.dataUrl} />
      <p style={{ textAlign: "center", fontSize: 14, color: "#c9bfa8", marginBottom: 24, lineHeight: 1.5 }}>{T("tagline")}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        <input ref={fileInputRef} type="file" accept="image/*" capture="environment" onChange={onPhoto} style={{ display: "none" }} />
        <button onClick={() => (photo ? onClearPhoto() : fileInputRef.current.click())} style={btnStyle(photo ? "secondary" : "primary")}>
          <span>{photo ? "✕" : "📷"}</span> {photo ? T("removePhoto") : T("takePhoto")}
        </button>
        <button onClick={onRequestLocation} disabled={locStatus === "fetching"} style={btnStyle(coords ? "secondary" : "primary")}>
          <span>📍</span> {locStatus === "fetching" ? T("locating") : coords ? T("locFetched") : T("useLocation")}
        </button>
      </div>
      {locStatus === "denied" && <p style={hintStyle}>{T("locDenied")}</p>}
      {coords && (
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#8fae9d", marginTop: 12, textAlign: "center" }}>
          {coords.lat.toFixed(4)}° N, {coords.lon.toFixed(4)}° E
          {placeName && <div style={{ color: "#c9bfa8", marginTop: 4, fontSize: 12 }}>{placeName.split(",").slice(0, 3).join(", ")}</div>}
        </div>
      )}
      {errorMsg && <p style={{ ...hintStyle, color: "#d98e78" }}>{errorMsg}</p>}
      <button onClick={onScan} style={{ ...btnStyle("accent"), width: "100%", marginTop: 20, justifyContent: "center" }}><span>🔎</span> {T("scan")}</button>
      <button onClick={onPromo} style={{ ...btnStyle("secondary"), width: "100%", marginTop: 10, justifyContent: "center" }}><span>🛍️</span> {T("promoButton")}</button>
    </div>
  );
}

function LoadingScreen({ text }) {
  return (
    <div style={{ textAlign: "center", padding: "60px 0" }}>
      <div style={{ width: 48, height: 48, margin: "0 auto 16px", border: "2px solid #b58a4a33", borderTopColor: "#b58a4a", borderRadius: "50%", animation: "spin 1s linear infinite" }} />
      <p style={{ fontSize: 14, color: "#c9bfa8" }}>{text}</p>
    </div>
  );
}

function ResultCard({ result, entryNo, onReset, speaking, onSpeak, onStopSpeak, T }) {
  const verified = result.verified !== false;
  const sources = Array.isArray(result.sources) ? result.sources.slice(0, 2) : [];
  return (
    <div style={{ background: "#ede4d3", color: "#2a2420", borderRadius: 6, padding: "22px 20px", border: "1px solid #b58a4a55" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#8a6a3f", letterSpacing: 1 }}>{T("fieldNote")} · №{String(entryNo).padStart(3, "0")}</div>
        <button onClick={speaking ? onStopSpeak : onSpeak} style={{ background: "transparent", border: "none", color: "#8a6a3f", cursor: "pointer", fontSize: 16 }}>{speaking ? "🔇" : "🔊"}</button>
      </div>
      <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 10, lineHeight: 1.2 }}>{result.place}</h2>
      <div style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 11, fontFamily: "'JetBrains Mono', monospace", padding: "3px 8px", borderRadius: 3, marginBottom: 12, background: verified ? "#3a5a3d18" : "#8a4a3018", color: verified ? "#3a5a3d" : "#8a4a30" }}>
        {verified ? `✓ ${T("verified")}` : `⚠ ${T("unverified")}`}
      </div>
      <div style={{ height: 1, background: "#2a242022", marginBottom: 12 }} />
      <p style={{ fontSize: 15, lineHeight: 1.6, marginBottom: 14 }}>{result.fact}</p>
      {sources.length > 0 && (
        <div style={{ marginBottom: 16 }}>
          {sources.map((s, i) => (
            <a key={i} href={s} target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#5c4a2f", textDecoration: "none", marginBottom: 4, wordBreak: "break-all" }}>🔗 {s.replace(/^https?:\/\//, "").slice(0, 46)}</a>
          ))}
        </div>
      )}
      {Array.isArray(result.tags) && result.tags.length > 0 && (
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 18 }}>
          {result.tags.map((tag, i) => <span key={i} style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, background: "#2a242012", padding: "3px 8px", borderRadius: 3, color: "#5c4a2f" }}>#{tag}</span>)}
        </div>
      )}
      <button onClick={onReset} style={{ ...btnStyle("primary"), width: "100%", justifyContent: "center" }}>🔄 {T("newScan")}</button>
    </div>
  );
}

function ErrorCard({ message, onRetry, T }) {
  return (
    <div style={{ textAlign: "center", padding: "40px 0" }}>
      <p style={{ color: "#d98e78", marginBottom: 16, fontSize: 14 }}>{message}</p>
      <button onClick={onRetry} style={{ ...btnStyle("primary"), margin: "0 auto" }}>🔄 {T("retry")}</button>
    </div>
  );
}

function PromoManual({ value, onChange, onSubmit, onBack, T }) {
  return (
    <div style={{ background: "#ede4d3", color: "#2a2420", borderRadius: 6, padding: "22px 20px", border: "1px solid #b58a4a55" }}>
      <p style={{ fontSize: 14, marginBottom: 14, lineHeight: 1.5 }}>{T("promoNoShop")}</p>
      <label style={{ fontSize: 12, color: "#5c4a2f", display: "block", marginBottom: 6 }}>{T("promoManualLabel")}</label>
      <input value={value} onChange={(e) => onChange(e.target.value)} placeholder={T("promoManualPlaceholder")}
        style={{ width: "100%", padding: "10px 12px", borderRadius: 4, border: "1px solid #b58a4a55", fontFamily: "'Fraunces', serif", fontSize: 14, marginBottom: 14 }} />
      <button onClick={onSubmit} style={{ ...btnStyle("accent"), width: "100%", justifyContent: "center", marginBottom: 8 }}>🛍️ {T("promoManualSubmit")}</button>
      <button onClick={onBack} style={{ ...btnStyle("primary"), width: "100%", justifyContent: "center", color: "#2a2420", border: "1px solid #2a242033" }}>← {T("promoBack")}</button>
    </div>
  );
}

function PromoResult({ data, shopHint, onBack, T }) {
  const verified = data.verified !== false;
  const items = Array.isArray(data.items) ? data.items.slice(0, 5) : [];
  return (
    <div style={{ background: "#ede4d3", color: "#2a2420", borderRadius: 6, padding: "22px 20px", border: "1px solid #b58a4a55" }}>
      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#8a6a3f", letterSpacing: 1, marginBottom: 6 }}>🛍️ {T("promoButton").toUpperCase()}</div>
      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>{data.shop}</h2>
      {shopHint && shopHint.brand && <div style={{ fontSize: 12, color: "#5c4a2f", marginBottom: 8 }}>{T("shopDetected")} {shopHint.name}</div>}
      <div style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 11, fontFamily: "'JetBrains Mono', monospace", padding: "3px 8px", borderRadius: 3, marginBottom: 14, background: verified ? "#3a5a3d18" : "#8a4a3018", color: verified ? "#3a5a3d" : "#8a4a30" }}>
        {verified ? `✓ ${T("verified")}` : `⚠ ${T("unverified")}`}
      </div>

      {items.length === 0 && <p style={{ fontSize: 14, color: "#5c4a2f", marginBottom: 16 }}>{T("promoNoDeals")}</p>}

      {items.map((item, i) => (
        <div key={i} style={{ borderTop: i === 0 ? "1px solid #2a242022" : "none", borderBottom: "1px solid #2a242022", padding: "10px 0" }}>
          <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 3 }}>{item.name}</div>
          <div style={{ fontSize: 13, color: "#3a5a3d", display: "flex", gap: 10, flexWrap: "wrap" }}>
            {item.promoPrice && <span>💰 {item.promoPrice}</span>}
            {item.competitorPrice && <span style={{ color: "#8a4a30" }}>vs {item.competitorPrice}</span>}
          </div>
          {item.note && <div style={{ fontSize: 12, color: "#5c4a2f", marginTop: 3 }}>{item.note}</div>}
          {item.source && <a href={item.source} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#8a6a3f", wordBreak: "break-all" }}>🔗 {item.source.replace(/^https?:\/\//, "").slice(0, 40)}</a>}
        </div>
      ))}

      <p style={{ fontSize: 11, color: "#8a6a3f", marginTop: 14, marginBottom: 16, fontStyle: "italic" }}>{T("promoDisclaimerFixed")}</p>

      <button onClick={onBack} style={{ ...btnStyle("primary"), width: "100%", justifyContent: "center", color: "#2a2420", border: "1px solid #2a242033" }}>← {T("promoBack")}</button>
    </div>
  );
}

function btnStyle(variant) {
  const base = { display: "flex", alignItems: "center", gap: 8, padding: "11px 16px", borderRadius: 4, border: "1px solid transparent", fontFamily: "'Fraunces', serif", fontSize: 14, fontWeight: 600, cursor: "pointer" };
  if (variant === "primary") return { ...base, background: "transparent", border: "1px solid #b58a4a99", color: "#ede4d3" };
  if (variant === "secondary") return { ...base, background: "#b58a4a22", border: "1px solid #b58a4a55", color: "#c9bfa8" };
  if (variant === "accent") return { ...base, background: "#b58a4a", color: "#16241f", border: "1px solid #b58a4a" };
  return base;
}

const hintStyle = { fontSize: 12, color: "#8fae9d", textAlign: "center", marginTop: 8 };

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<FieldScout />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./service-worker.js").catch(() => {}); });
}
</script>
</body>
</html>
