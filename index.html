function t(lang, key) { return (STRINGS[lang] && STRINGS[lang][key]) || STRINGS.pl[key] || key; }

async function findNearbyShop(lat, lon) {
  const query = `[out:json][timeout:15];(node(around:50,${lat},${lon})[shop];way(around:50,${lat},${lon})[shop];node(around:50,${lat},${lon})["shop"="mall"];way(around:50,${lat},${lon})["shop"="mall"];);out center 10;`;
  try {
    const res = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: query });
    const data = await res.json();
    const elements = data.elements || [];
    if (elements.length === 0) return null;
    const named = elements.find((e) => e.tags && e.tags.name) || elements[0];
    if (!named.tags) return null;
    return { name: named.tags.name || named.tags.brand || named.tags.shop, shopType: named.tags.shop || "sklep", brand: named.tags.brand || null };
  } catch (e) { return null; }
}

class MissingApiKeyError extends Error {}
class ApiCallError extends Error {}

async function callClaude(contentBlocks, apiKey) {
  if (!apiKey) throw new MissingApiKeyError("no api key");
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1500,
      messages: [{ role: "user", content: contentBlocks }],
      tools: [{ type: "web_search_20250305", name: "web_search" }],
    }),
  });
  if (!response.ok) {
    let detail = "";
    try { const errBody = await response.json(); detail = (errBody.error && errBody.error.message) || ""; } catch (e) {}
    throw new ApiCallError(detail || `HTTP ${response.status}`);
  }
  const data = await response.json();
  const text = (data.content || []).map((b) => (b.type === "text" ? b.text : "")).filter(Boolean).join("\n");
  const clean = text.replace(/```json|```/g, "").trim();
  const jsonMatch = clean.match(/\{[\s\S]*\}/);
  return JSON.parse(jsonMatch ? jsonMatch[0] : clean);
}

function FieldScout() {
  const [lang, setLang] = useState("pl");
  const [apiKey, setApiKey] = useState(() => { try { return localStorage.getItem("psheradar_api_key") || ""; } catch (e) { return ""; } });
  const [showSettings, setShowSettings] = useState(false);
  const [step, setStep] = useState("start");
  const [photo, setPhoto] = useState(null);
  const [coords, setCoords] = useState(null);
  const [placeName, setPlaceName] = useState(null);
  const [locStatus, setLocStatus] = useState("idle");
  const [errorMsg, setErrorMsg] = useState("");
  const [result, setResult] = useState(null);
  const [askResult, setAskResult] = useState(null);
  const [askQuery, setAskQuery] = useState("");
  const [listening, setListening] = useState(false);
  const [speaking, setSpeaking] = useState(false);
  const [autoSpeak, setAutoSpeak] = useState(true);
  const [detectedShop, setDetectedShop] = useState(null);
  const [manualShop, setManualShop] = useState("");
  const [promoResult, setPromoResult] = useState(null);

  const fileInputRef = useRef(null);
  const recognitionRef = useRef(null);
  const T = (key) => t(lang, key);

  useEffect(() => { if (!apiKey) setShowSettings(true); }, []);

  const speak = useCallback((text) => {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = SPEECH_LANG[lang] || "pl-PL";
    const voices = window.speechSynthesis.getVoices();
    const match = voices.find((v) => v.lang && v.lang.startsWith(lang));
    if (match) utter.voice = match;
    utter.onstart = () => setSpeaking(true);
    utter.onend = () => setSpeaking(false);
    utter.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(utter);
  }, [lang]);

  const stopSpeaking = () => { window.speechSynthesis && window.speechSynthesis.cancel(); setSpeaking(false); };

  const saveApiKey = (key) => {
    setApiKey(key);
    try { localStorage.setItem("psheradar_api_key", key); } catch (e) {}
    setShowSettings(false);
  };

  const handleApiError = (e) => {
    if (e instanceof MissingApiKeyError) {
      setShowSettings(true);
      setErrorMsg(T("needApiKey"));
    } else if (e instanceof ApiCallError) {
      setErrorMsg(`${T("apiError")}: ${e.message}`);
    } else {
      setErrorMsg(T("genericError"));
    }
    setStep("error");
  };

  const fetchLocation = useCallback(() => {
    return new Promise((resolve) => {
      setLocStatus("fetching");
      if (!navigator.geolocation) { setLocStatus("denied"); resolve(null); return; }
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const { latitude, longitude } = pos.coords;
          const newCoords = { lat: latitude, lon: longitude };
          setCoords(newCoords);
          let name = null;
          try {
            const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=16&addressdetails=1`, { headers: { Accept: "application/json" } });
            const data = await r.json();
            name = data.display_name || null;
            setPlaceName(name);
          } catch (e) { setPlaceName(null); }
          setLocStatus("ok");
          resolve({ coords: newCoords, placeName: name });
        },
        () => { setLocStatus("denied"); resolve(null); },
        { enableHighAccuracy: true, timeout: 8000 }
      );
    });
  }, []);

  const handlePhoto = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      const base64 = dataUrl.split(",")[1];
      setPhoto({ dataUrl, mediaType: file.type || "image/jpeg", base64 });
    };
    reader.readAsDataURL(file);
  };

  const reset = () => {
    setStep("start"); setPhoto(null); setResult(null); setAskResult(null); setErrorMsg("");
    setPromoResult(null); setDetectedShop(null); setManualShop(""); setAskQuery(""); stopSpeaking();
  };

  const runScan = useCallback(async (overrides = {}) => {
    const { photoOverride, coordsOverride, placeOverride } = overrides;
    const usedPhoto = photoOverride !== undefined ? photoOverride : photo;
    const usedCoords = coordsOverride !== undefined ? coordsOverride : coords;
    const usedPlace = placeOverride !== undefined ? placeOverride : placeName;

    if (!usedPhoto && !usedCoords) { setErrorMsg(T("needPhotoOrLoc")); return; }
    setStep("loading"); setErrorMsg("");

    const locationLine = usedCoords
      ? `GPS: ${usedCoords.lat.toFixed(5)}, ${usedCoords.lon.toFixed(5)}.${usedPlace ? ` Likely address: ${usedPlace}.` : ""}`
      : "No GPS data — rely on the photo only.";

    const depthInstruction = usedPhoto
      ? "A photo is attached. Focus on the specific subject in the photo and give ONE precise, fact-checked highlight about it."
      : "No photo — only location. Give 2 to 4 of the most interesting, important, fact-checked highlights about this exact place and its immediate surroundings (history, notable nearby landmarks, something distinctive worth knowing).";

    const promptText = `You are a field-guide explorer assistant. ${depthInstruction}

${locationLine}

RULES (important, to avoid making things up):
1. ALWAYS use the web_search tool to verify facts before answering.
2. If you cannot confirm something with a credible source, set "verified": false for that item, or omit it.
3. In "sources" list up to 3 URLs you actually used overall.
4. Respond in this language: ${LANG_NAMES[lang]}.

Respond ONLY in JSON, no markdown:
{"place": "short place name", "summary": "1 sentence intro", "highlights": [{"title":"short title","text":"1-3 sentences"}], "tags": ["tag1","tag2","tag3"], "verified": true, "sources": ["https://..."]}`;

    const contentBlocks = [];
    if (usedPhoto) contentBlocks.push({ type: "image", source: { type: "base64", media_type: usedPhoto.mediaType, data: usedPhoto.base64 } });
    contentBlocks.push({ type: "text", text: promptText });

    try {
      const parsed = await callClaude(contentBlocks, apiKey);
      setResult(parsed);
      setStep("result");
      if (autoSpeak) {
        const spoken = [parsed.place, parsed.summary, ...(parsed.highlights || []).map((h) => h.text)].filter(Boolean).join(". ");
        setTimeout(() => speak(spoken), 300);
      }
    } catch (e) { handleApiError(e); }
  }, [photo, coords, placeName, autoSpeak, speak, lang, apiKey]);

  const runAsk = useCallback(async (question) => {
    if (!question || !question.trim()) return;
    setStep("ask-loading"); setErrorMsg("");
    const locationLine = coords ? `User's current GPS: ${coords.lat.toFixed(5)}, ${coords.lon.toFixed(5)}.${placeName ? ` Likely address: ${placeName}.` : ""}` : "No location shared.";
    const promptText = `You are a helpful on-the-go field assistant. The user asked, out loud or by typing, this question: "${question}"

Context: ${locationLine}

RULES:
1. If the question relates to a place, current facts, prices, or anything time-sensitive, ALWAYS use web_search to verify before answering.
2. Keep the answer concise and conversational (2-5 sentences), suitable to be read aloud.
3. If you cannot verify something, say so plainly rather than guessing.
4. Respond in this language: ${LANG_NAMES[lang]}.

Respond ONLY in JSON, no markdown:
{"answer": "your answer", "verified": true, "sources": ["https://..."]}`;

    try {
      const parsed = await callClaude([{ type: "text", text: promptText }], apiKey);
      setAskResult({ question, ...parsed });
      setStep("ask-result");
      if (autoSpeak) setTimeout(() => speak(parsed.answer), 300);
    } catch (e) { handleApiError(e); }
  }, [coords, placeName, autoSpeak, speak, lang, apiKey]);

  const startPromoCheck = async () => {
    setStep("promo-checking");
    let usedCoords = coords;
    if (!usedCoords) { const loc = await fetchLocation(); usedCoords = loc && loc.coords; }
    if (!usedCoords) { setStep("promo-manual"); return; }
    const shop = await findNearbyShop(usedCoords.lat, usedCoords.lon);
    if (shop) { setDetectedShop(shop); runPromoScan(shop.name); } else { setStep("promo-manual"); }
  };

  const runPromoScan = async (shopName) => {
    setStep("promo-loading");
    const promptText = `You are a shopping assistant. The user is at or near this shop: "${shopName}".

Search the web for that shop's CURRENT, real, publicly published promotions, and compare up to 5 promoted items against typical competitor prices.

RULES:
1. ALWAYS use web_search. Only include items backed by a real, current, credible source.
2. If nothing verifiable is found, return an empty "items" array and "verified": false.
3. Never invent prices.
4. Cap at 5 items.
5. Respond in this language: ${LANG_NAMES[lang]}.

Respond ONLY in JSON, no markdown:
{"shop": "shop name", "verified": true, "items": [{"name":"...", "promoPrice":"...", "competitorPrice":"... or omit", "note":"...", "source":"https://..."}]}`;
    try {
      const parsed = await callClaude([{ type: "text", text: promptText }], apiKey);
      setPromoResult(parsed);
      setStep("promo-result");
    } catch (e) { handleApiError(e); }
  };

  const normalize = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

  const toggleListening = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    if (listening) { recognitionRef.current && recognitionRef.current.stop(); setListening(false); return; }
    const recognition = new SR();
    recognition.lang = SPEECH_LANG[lang] || "pl-PL";
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onstart = () => setListening(true);
    recognition.onerror = () => setListening(false);
    recognition.onend = () => setListening(false);
    recognition.onresult = async (event) => {
      const transcript = event.results[0][0].transcript;
      const norm = normalize(transcript);
      if (norm.includes(TRIGGERS[lang] || "gdzie jestem")) {
        const loc = await fetchLocation();
        if (loc) runScan({ coordsOverride: loc.coords, placeOverride: loc.placeName, photoOverride: null });
      } else {
        runAsk(transcript);
      }
    };
    recognitionRef.current = recognition;
    recognition.start();
  };

  return (
    <div style={{ minHeight: "100vh", background: `radial-gradient(circle at 30% 0%, ${BG2} 0%, ${BG} 55%)`, color: TEXT, fontFamily: "'Inter', sans-serif", display: "flex", justifyContent: "center", padding: "20px 16px 40px" }}>
      <div style={{ width: "100%", maxWidth: 420 }}>
        <Header lang={lang} setLang={setLang} T={T} autoSpeak={autoSpeak} onToggleAutoSpeak={() => setAutoSpeak((v) => !v)}
          onOpenSettings={() => setShowSettings(true)} />
        {showSettings && <SettingsModal apiKey={apiKey} onSave={saveApiKey} onClose={() => setShowSettings(false)} T={T} />}
        <AskBar listening={listening} onToggleMic={toggleListening} T={T} value={askQuery} onChange={setAskQuery}
          onSubmit={() => { runAsk(askQuery); setAskQuery(""); }} />

        {step === "start" && (
          <StartScreen photo={photo} coords={coords} placeName={placeName} locStatus={locStatus} errorMsg={errorMsg}
            fileInputRef={fileInputRef} onPhoto={handlePhoto} onRequestLocation={fetchLocation}
            onClearPhoto={() => setPhoto(null)} onScan={() => runScan()} onPromo={startPromoCheck} T={T} />
        )}
        {step === "loading" && <LoadingScreen text={T("loading")} />}
        {step === "result" && result && (
          <ResultCard result={result} onReset={reset} speaking={speaking}
            onSpeak={() => speak([result.place, result.summary, ...(result.highlights || []).map((h) => h.text)].filter(Boolean).join(". "))}
            onStopSpeak={stopSpeaking} T={T} />
        )}
        {step === "ask-loading" && <LoadingScreen text={T("askThinking")} />}
        {step === "ask-result" && askResult && (
          <AskResultCard data={askResult} onReset={reset} speaking={speaking}
            onSpeak={() => speak(askResult.answer)} onStopSpeak={stopSpeaking} T={T} />
        )}
        {step === "error" && <ErrorCard message={errorMsg} onRetry={reset} T={T} />}

        {step === "promo-checking" && <LoadingScreen text={T("promoChecking")} />}
        {step === "promo-manual" && (
          <PromoManual value={manualShop} onChange={setManualShop} onSubmit={() => manualShop.trim() && runPromoScan(manualShop.trim())} onBack={reset} T={T} />
        )}
        {step === "promo-loading" && <LoadingScreen text={T("promoSearching")} />}
        {step === "promo-result" && promoResult && (
          <PromoResult data={promoResult} shopHint={detectedShop} onBack={reset} T={T} />
        )}
      </div>
    </div>
  );
}

function Header({ lang, setLang, T, autoSpeak, onToggleAutoSpeak, onOpenSettings }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 30, height: 30, borderRadius: 9, background: GRADIENT, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}>🧭</div>
        <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 19, fontWeight: 700, letterSpacing: -0.3 }}>PsheRadar</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <button onClick={onOpenSettings} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 10, width: 32, height: 32, color: TEXT_MUTED, cursor: "pointer", fontSize: 14 }}>⚙️</button>
        <button onClick={onToggleAutoSpeak} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 10, width: 32, height: 32, color: autoSpeak ? CYAN : TEXT_MUTED, cursor: "pointer", fontSize: 14 }}>{autoSpeak ? "🔊" : "🔇"}</button>
        <select value={lang} onChange={(e) => setLang(e.target.value)} style={{ background: CARD, color: TEXT, border: `1px solid ${BORDER}`, borderRadius: 10, fontSize: 12, padding: "6px 8px" }}>
          <option value="pl">PL</option><option value="en">EN</option><option value="de">DE</option><option value="uk">UA</option>
        </select>
      </div>
    </div>
  );
}

function SettingsModal({ apiKey, onSave, onClose, T }) {
  const [value, setValue] = useState(apiKey || "");
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }} onClick={onClose}>
      <div style={{ background: CARD, borderRadius: 18, padding: "22px 20px", border: `1px solid ${BORDER}`, width: "100%", maxWidth: 360 }} onClick={(e) => e.stopPropagation()}>
        <h3 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 16, fontWeight: 700, marginBottom: 12 }}>{T("settingsTitle")}</h3>
        <label style={{ fontSize: 12, color: TEXT_MUTED, display: "block", marginBottom: 6 }}>{T("apiKeyLabel")}</label>
        <input type="password" value={value} onChange={(e) => setValue(e.target.value)} placeholder={T("apiKeyPlaceholder")}
          style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: `1px solid ${BORDER}`, background: BG2, color: TEXT, fontFamily: "'JetBrains Mono', monospace", fontSize: 13, marginBottom: 10 }} />
        <p style={{ fontSize: 11, color: TEXT_MUTED, marginBottom: 16, lineHeight: 1.5 }}>{T("apiKeyHelp")}</p>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onClose} style={{ flex: 1, padding: "12px", borderRadius: 14, border: `1px solid ${BORDER}`, background: "transparent", color: TEXT_MUTED, cursor: "pointer" }}>✕</button>
          <button onClick={() => onSave(value.trim())} style={{ flex: 3, padding: "12px", borderRadius: 14, border: "none", background: GRADIENT, color: "#0d0c18", fontWeight: 700, cursor: "pointer" }}>{T("apiKeySave")}</button>
        </div>
      </div>
    </div>
  );
}

function AskBar({ listening, onToggleMic, T, value, onChange, onSubmit }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 20, background: CARD, border: `1px solid ${listening ? "transparent" : BORDER}`, backgroundImage: listening ? GRADIENT : "none", padding: listening ? 1.5 : 0, borderRadius: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, background: CARD, borderRadius: 14.5, width: "100%", padding: "6px 6px 6px 14px" }}>
        <input value={value} onChange={(e) => onChange(e.target.value)} onKeyDown={(e) => e.key === "Enter" && onSubmit()}
          placeholder={listening ? T("listening") : T("voiceHintDefault")}
          style={{ flex: 1, background: "transparent", border: "none", color: TEXT, fontFamily: "'Inter', sans-serif", fontSize: 14, padding: "8px 0" }} />
        <button onClick={onToggleMic} style={{ width: 34, height: 34, borderRadius: 10, border: "none", flexShrink: 0, background: listening ? GRADIENT : "rgba(255,255,255,0.06)", color: listening ? "#0d0c18" : TEXT, cursor: "pointer", fontSize: 14 }}>{listening ? "🎙️" : "🎤"}</button>
        <button onClick={onSubmit} style={{ width: 34, height: 34, borderRadius: 10, border: "none", flexShrink: 0, background: GRADIENT, color: "#0d0c18", cursor: "pointer", fontSize: 14, fontWeight: 700 }}>➤</button>
      </div>
    </div>
  );
}

function Viewfinder({ photoUrl }) {
  return (
    <div style={{ position: "relative", width: 190, height: 190, margin: "4px auto 22px" }}>
      <div style={{ position: "absolute", inset: -2, borderRadius: "50%", background: GRADIENT, opacity: 0.5, filter: "blur(14px)" }} />
      <div style={{ position: "absolute", inset: 0, borderRadius: "50%", overflow: "hidden", background: BG2, border: `1px solid ${BORDER}` }}>
        {photoUrl ? <img src={photoUrl} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36, opacity: 0.5 }}>📷</div>}
      </div>
    </div>
  );
}

function StartScreen({ photo, coords, placeName, locStatus, errorMsg, fileInputRef, onPhoto, onRequestLocation, onClearPhoto, onScan, onPromo, T }) {
  return (
    <div>
      <Viewfinder photoUrl={photo && photo.dataUrl} />
      <p style={{ textAlign: "center", fontSize: 14, color: TEXT_MUTED, marginBottom: 22, lineHeight: 1.5, padding: "0 8px" }}>{T("tagline")}</p>

      <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
        <input ref={fileInputRef} type="file" accept="image/*" capture="environment" onChange={onPhoto} style={{ display: "none" }} />
        <button onClick={() => (photo ? onClearPhoto() : fileInputRef.current.click())} style={pillStyle(!!photo)}>
          <span>{photo ? "✕" : "📷"}</span> {photo ? T("removePhoto") : T("takePhoto")}
        </button>
        <button onClick={onRequestLocation} disabled={locStatus === "fetching"} style={pillStyle(!!coords)}>
          <span>📍</span> {locStatus === "fetching" ? T("locating") : coords ? T("locFetched") : T("useLocation")}
        </button>
      </div>

      {locStatus === "denied" && <p style={hintStyle}>{T("locDenied")}</p>}
      {coords && (
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: TEXT_MUTED, marginBottom: 8, textAlign: "center" }}>
          {coords.lat.toFixed(4)}°, {coords.lon.toFixed(4)}°
          {placeName && <div style={{ color: TEXT_MUTED, marginTop: 2 }}>{placeName.split(",").slice(0, 3).join(", ")}</div>}
        </div>
      )}
      {errorMsg && <p style={{ ...hintStyle, color: "#F87171" }}>{errorMsg}</p>}

      <button onClick={onScan} style={{ width: "100%", marginTop: 14, padding: "14px", borderRadius: 14, border: "none", background: GRADIENT, color: "#0d0c18", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
        🔎 {T("scan")}
      </button>
      <button onClick={onPromo} style={{ width: "100%", marginTop: 10, padding: "13px", borderRadius: 14, border: `1px solid ${BORDER}`, background: CARD, color: TEXT, fontFamily: "'Inter', sans-serif", fontWeight: 600, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
        🛍️ {T("promoButton")}
      </button>
    </div>
  );
}

function LoadingScreen({ text }) {
  return (
    <div style={{ textAlign: "center", padding: "50px 0" }}>
      <div style={{ width: 44, height: 44, margin: "0 auto 16px", borderRadius: "50%", background: GRADIENT, animation: "spin 1.2s linear infinite, pulse 1.6s ease-in-out infinite", opacity: 0.9 }} />
      <p style={{ fontSize: 14, color: TEXT_MUTED }}>{text}</p>
    </div>
  );
}

function VerifiedBadge({ verified, T }) {
  return (
    <div style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 11, fontFamily: "'JetBrains Mono', monospace", padding: "4px 10px", borderRadius: 20, marginBottom: 14, background: verified ? "rgba(34,211,238,0.12)" : "rgba(248,113,113,0.12)", color: verified ? CYAN : "#F87171" }}>
      {verified ? `✓ ${T("verified")}` : `⚠ ${T("unverified")}`}
    </div>
  );
}

function CardShell({ children }) {
  return <div style={{ background: CARD, borderRadius: 18, padding: "20px 18px", border: `1px solid ${BORDER}` }}>{children}</div>;
}

function SpeakButton({ speaking, onSpeak, onStopSpeak }) {
  return <button onClick={speaking ? onStopSpeak : onSpeak} style={{ background: "rgba(255,255,255,0.06)", border: "none", borderRadius: 10, width: 30, height: 30, color: TEXT, cursor: "pointer", fontSize: 14 }}>{speaking ? "🔇" : "🔊"}</button>;
}

function ResultCard({ result, onReset, speaking, onSpeak, onStopSpeak, T }) {
  const verified = result.verified !== false;
  const sources = Array.isArray(result.sources) ? result.sources.slice(0, 3) : [];
  const highlights = Array.isArray(result.highlights) ? result.highlights : [];
  return (
    <CardShell>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: TEXT_MUTED, letterSpacing: 1 }}>{T("fieldNote")}</span>
        <SpeakButton speaking={speaking} onSpeak={onSpeak} onStopSpeak={onStopSpeak} />
      </div>
      <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 22, fontWeight: 700, margin: "6px 0 6px", lineHeight: 1.2 }}>{result.place}</h2>
      {result.summary && <p style={{ fontSize: 14, color: TEXT_MUTED, marginBottom: 12, lineHeight: 1.5 }}>{result.summary}</p>}
      <VerifiedBadge verified={verified} T={T} />

      {highlights.map((h, i) => (
        <div key={i} style={{ borderTop: `1px solid ${BORDER}`, padding: "12px 0" }}>
          {h.title && <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: 14, marginBottom: 4, color: CYAN }}>{h.title}</div>}
          <div style={{ fontSize: 14, lineHeight: 1.6 }}>{h.text}</div>
        </div>
      ))}

      {sources.length > 0 && (
        <div style={{ marginTop: 10 }}>
          {sources.map((s, i) => (
            <a key={i} href={s} target="_blank" rel="noopener noreferrer" style={{ display: "block", fontSize: 11, color: TEXT_MUTED, textDecoration: "none", marginBottom: 3, wordBreak: "break-all" }}>🔗 {s.replace(/^https?:\/\//, "").slice(0, 44)}</a>
          ))}
        </div>
      )}
      {Array.isArray(result.tags) && result.tags.length > 0 && (
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 14, marginBottom: 16 }}>
          {result.tags.map((tag, i) => <span key={i} style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, background: "rgba(124,92,252,0.14)", padding: "4px 9px", borderRadius: 20, color: VIOLET }}>#{tag}</span>)}
        </div>
      )}
      <NewScanButton onReset={onReset} T={T} />
    </CardShell>
  );
}

function AskResultCard({ data, onReset, speaking, onSpeak, onStopSpeak, T }) {
  const verified = data.verified !== false;
  const sources = Array.isArray(data.sources) ? data.sources.slice(0, 3) : [];
  return (
    <CardShell>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: TEXT_MUTED, letterSpacing: 1 }}>{T("askAnswer")}</span>
        <SpeakButton speaking={speaking} onSpeak={onSpeak} onStopSpeak={onStopSpeak} />
      </div>
      <p style={{ fontSize: 13, color: TEXT_MUTED, marginBottom: 10, fontStyle: "italic" }}>“{data.question}”</p>
      <VerifiedBadge verified={verified} T={T} />
      <p style={{ fontSize: 15, lineHeight: 1.7, marginBottom: 14 }}>{data.answer}</p>
      {sources.length > 0 && (
        <div style={{ marginBottom: 16 }}>
          {sources.map((s, i) => (
            <a key={i} href={s} target="_blank" rel="noopener noreferrer" style={{ display: "block", fontSize: 11, color: TEXT_MUTED, textDecoration: "none", marginBottom: 3, wordBreak: "break-all" }}>🔗 {s.replace(/^https?:\/\//, "").slice(0, 44)}</a>
          ))}
        </div>
      )}
      <NewScanButton onReset={onReset} T={T} />
    </CardShell>
  );
}

function NewScanButton({ onReset, T }) {
  return (
    <button onClick={onReset} style={{ width: "100%", padding: "13px", borderRadius: 14, border: "none", background: GRADIENT, color: "#0d0c18", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
      🔄 {T("newScan")}
    </button>
  );
}

function ErrorCard({ message, onRetry, T }) {
  return (
    <div style={{ textAlign: "center", padding: "40px 0" }}>
      <p style={{ color: "#F87171", marginBottom: 16, fontSize: 14 }}>{message}</p>
      <button onClick={onRetry} style={{ padding: "12px 20px", borderRadius: 14, border: "none", background: GRADIENT, color: "#0d0c18", fontWeight: 700, cursor: "pointer" }}>🔄 {T("retry")}</button>
    </div>
  );
}

function PromoManual({ value, onChange, onSubmit, onBack, T }) {
  return (
    <CardShell>
      <p style={{ fontSize: 14, marginBottom: 14, lineHeight: 1.5, color: TEXT_MUTED }}>{T("promoNoShop")}</p>
      <label style={{ fontSize: 12, color: TEXT_MUTED, display: "block", marginBottom: 6 }}>{T("promoManualLabel")}</label>
      <input value={value} onChange={(e) => onChange(e.target.value)} placeholder={T("promoManualPlaceholder")}
        style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: `1px solid ${BORDER}`, background: BG2, color: TEXT, fontFamily: "'Inter', sans-serif", fontSize: 14, marginBottom: 14 }} />
      <button onClick={onSubmit} style={{ width: "100%", padding: "13px", borderRadius: 14, border: "none", background: GRADIENT, color: "#0d0c18", fontWeight: 700, cursor: "pointer", marginBottom: 8 }}>🛍️ {T("promoManualSubmit")}</button>
      <button onClick={onBack} style={{ width: "100%", padding: "12px", borderRadius: 14, border: `1px solid ${BORDER}`, background: "transparent", color: TEXT_MUTED, cursor: "pointer" }}>← {T("back")}</button>
    </CardShell>
  );
}

function PromoResult({ data, shopHint, onBack, T }) {
  const verified = data.verified !== false;
  const items = Array.isArray(data.items) ? data.items.slice(0, 5) : [];
  return (
    <CardShell>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: TEXT_MUTED, letterSpacing: 1 }}>🛍️ {T("promoButton").toUpperCase()}</span>
      <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 20, fontWeight: 700, margin: "6px 0 4px" }}>{data.shop}</h2>
      {shopHint && shopHint.name && <div style={{ fontSize: 12, color: TEXT_MUTED, marginBottom: 8 }}>{T("shopDetected")} {shopHint.name}</div>}
      <VerifiedBadge verified={verified} T={T} />

      {items.length === 0 && <p style={{ fontSize: 14, color: TEXT_MUTED, marginBottom: 16 }}>{T("promoNoDeals")}</p>}

      {items.map((item, i) => (
        <div key={i} style={{ borderTop: `1px solid ${BORDER}`, padding: "12px 0" }}>
          <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4 }}>{item.name}</div>
          <div style={{ fontSize: 13, display: "flex", gap: 10, flexWrap: "wrap" }}>
            {item.promoPrice && <span style={{ color: CYAN }}>💰 {item.promoPrice}</span>}
            {item.competitorPrice && <span style={{ color: "#F87171" }}>vs {item.competitorPrice}</span>}
          </div>
          {item.note && <div style={{ fontSize: 12, color: TEXT_MUTED, marginTop: 3 }}>{item.note}</div>}
          {item.source && <a href={item.source} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: TEXT_MUTED, wordBreak: "break-all" }}>🔗 {item.source.replace(/^https?:\/\//, "").slice(0, 40)}</a>}
        </div>
      ))}

      <p style={{ fontSize: 11, color: TEXT_MUTED, marginTop: 14, marginBottom: 16, fontStyle: "italic" }}>{T("promoDisclaimerFixed")}</p>
      <button onClick={onBack} style={{ width: "100%", padding: "12px", borderRadius: 14, border: `1px solid ${BORDER}`, background: "transparent", color: TEXT_MUTED, cursor: "pointer" }}>← {T("back")}</button>
    </CardShell>
  );
}

function pillStyle(active) {
  return {
    flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
    padding: "12px 8px", borderRadius: 14, border: `1px solid ${active ? "transparent" : BORDER}`,
    background: active ? "rgba(34,211,238,0.12)" : CARD, color: active ? CYAN : TEXT,
    fontFamily: "'Inter', sans-serif", fontSize: 13, fontWeight: 600, cursor: "pointer",
  };
}

const hintStyle = { fontSize: 12, color: TEXT_MUTED, textAlign: "center", marginBottom: 8 };

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<FieldScout />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./service-worker.js").catch(() => {}); });
}
</script>
</body>
</html>
